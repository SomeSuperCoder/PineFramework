schema: spec-driven

context: |
  Tech stack: TypeScript, React (Vite), Node.js (Express), HTML5 Canvas
  Package manager: pnpm workspaces (monorepo)
  Engine: pine-framework (root package) - Pine Script v5/v6 compatible execution and rendering engine
  Frontend: pine-framework-frontend (React + Vite) - custom canvas charting library
  Backend: pine-framework-backend (Express + WebSocket) - Bybit market data, script execution
  Domain: Pine Script v5/v6 compatible alternative runtime for TradingView
  Testing: Jest with ts-jest, integration tests in tests/
  Conventions: Conventional commits, ESLint + Prettier
  Project is a fully implemented Pine Script v5/v6 engine with canvas charting, Bybit integration, Telegram alerts, backtesting, progressive indicator computation, and dynamic indicator management
